name: Update leaderboard

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [master, main]
    paths:
      - 'crates.txt'
      - 'src/**'
      - 'Cargo.toml'

permissions:
  contents: write

concurrency:
  group: leaderboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run leaderboard update
        run: cargo run --release

      - name: Commit updated data and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only commit if data/ actually changed (a real version bump was
          # recorded). docs/index.html is regenerated every run and always
          # differs by at least its embedded timestamp, even when nothing
          # about the tracked crates changed -- staging it unconditionally
          # used to mean every single run committed, cron or not. Checking
          # data/ specifically, before staging anything, tells us whether
          # there's a *real* change to publish.
          if git diff --quiet -- data/; then
            echo "no data changes -- skipping commit (docs/index.html was regenerated in this run but discarded, since only its timestamp differed)"
          else
            git add data/ docs/
            git commit -m "Update leaderboard data [skip ci]"
            git push
          fi
